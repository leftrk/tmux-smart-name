name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha
        run: |
          curl -sL https://github.com/leftrk/tmux-window-name/archive/refs/tags/${{ steps.version.outputs.VERSION }}.tar.gz -o release.tar.gz
          SHA256=$(sha256sum release.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update Formula SHA256
        run: |
          sed -i "s/SHA256_WILL_BE_CALCULATED_AFTER_TAG_RELEASE/${{ steps.sha.outputs.SHA256 }}/g" Formula/tmux-window-name.rb

      - name: Update Formula version
        run: |
          sed -i "s/v1.0.0/${{ steps.version.outputs.VERSION }}/g" Formula/tmux-window-name.rb

      - name: Commit Formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tmux-window-name.rb
          git commit -m "Update Formula for ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:dev

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release.tar.gz